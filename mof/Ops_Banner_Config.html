    <script>
        /* 展示位置树 — 后续可在 children 下扩展其他页面 */
        const BANNER_POSITION_TREE = [
            {
                label: 'ewealthhub',
                children: [
                    {
                        label: '产品甄选',
                        children: [
                            {
                                label: '基金产品',
                                value: 'ewealthhub-产品甄选-基金产品banner位',
                                banner: true
                            }
                        ]
                    }
                ]
            }
        ];

        const DEFAULT_POSITION = 'ewealthhub-产品甄选-基金产品banner位';

        function flattenBannerLeaves(nodes, path = []) {
            const leaves = [];
            nodes.forEach(n => {
                const cur = [...path, n.label];
                if (n.value) leaves.push({ value: n.value, path: cur, label: n.label });
                if (n.children) leaves.push(...flattenBannerLeaves(n.children, cur));
            });
            return leaves;
        }

        const BANNER_POSITION_LEAVES = flattenBannerLeaves(BANNER_POSITION_TREE);

        function positionPathLabel(pos) {
            const leaf = BANNER_POSITION_LEAVES.find(x => x.value === pos);
            return leaf ? leaf.path.join(' › ') : pos;
        }

        function renderPositionTree(selected) {
            const html = `
                <div class="tree-node branch">ewealthhub</div>
                <div class="tree-node branch indent-2">产品甄选</div>
                ${BANNER_POSITION_LEAVES.map(leaf => `
                    <div class="tree-node leaf indent-3 ${leaf.value === selected ? 'selected' : ''}"
                         data-value="${leaf.value}" onclick="selectPosition('${leaf.value}')">
                        <span>📄</span><span>${leaf.label}</span><span style="color:#999;font-size:11px;margin-left:auto">banner位</span>
                    </div>`).join('')}`;
            document.getElementById('positionTree').innerHTML = html;
            document.getElementById('fPosition').value = selected || '';
            document.getElementById('positionPathHint').textContent = selected ? positionPathLabel(selected) : '—';
        }

        function selectPosition(value) {
            document.getElementById('fPosition').value = value;
            renderPositionTree(value);
        }
        const GRADIENTS = [
            'linear-gradient(135deg, #1e3a5f, #2563eb, #3b82f6)',
            'linear-gradient(135deg, #064e3b, #059669, #10b981)',
            'linear-gradient(135deg, #7c2d12, #ea580c, #f97316)',
            'linear-gradient(135deg, #4c1d95, #7c3aed, #a78bfa)',
            'linear-gradient(135deg, #0f766e, #14b8a6)',
            'linear-gradient(135deg, #1e3a5f, #2563eb)'
        ];

        function buildMockBanners() {
            const base = [
                { title: '精选货币基金', status: 'ACTIVE', sort_order: 1,
                  valid_from: '2026-01-01T00:00', valid_to: '2026-12-31T23:59', link_url: '#featured' },
                { title: '美元 MMF 专区', status: 'ACTIVE', sort_order: 2,
                  valid_from: '2026-03-01T00:00', valid_to: '2026-09-30T23:59', link_url: '#usd-mmf' },
                { title: '新客专享活动', status: 'INACTIVE', sort_order: 3,
                  valid_from: '2026-08-01T00:00', valid_to: '2026-08-31T23:59', link_url: '#promo' },
                { title: '平安货币基金上新', status: 'ACTIVE', sort_order: 4,
                  valid_from: '2026-06-01T00:00', valid_to: '2026-12-31T23:59', link_url: '#pingan' },
                { title: '港元货基精选', status: 'ACTIVE', sort_order: 5,
                  valid_from: '2026-02-15T00:00', valid_to: '2026-11-30T23:59', link_url: '#hkd' },
                { title: '暑期理财季', status: 'INACTIVE', sort_order: 6,
                  valid_from: '2026-07-01T00:00', valid_to: '2026-08-31T23:59', link_url: '#summer' },
                { title: '泰康系列货基', status: 'INACTIVE', sort_order: 7,
                  valid_from: '2025-01-01T00:00', valid_to: '2025-12-31T23:59', link_url: '#taikang' },
                { title: '高息美元 MMF', status: 'ACTIVE', sort_order: 8,
                  valid_from: '2026-04-01T00:00', valid_to: '2026-10-31T23:59', link_url: '#high-yield' },
                { title: '机构客户专享', status: 'ACTIVE', sort_order: 9,
                  valid_from: '2026-01-15T00:00', valid_to: '2026-12-15T23:59', link_url: '#inst' },
                { title: '跨境理财通专题', status: 'ACTIVE', sort_order: 10,
                  valid_from: '2026-05-01T00:00', valid_to: '2026-12-31T23:59', link_url: '#wmc' },
                { title: '年末回馈活动', status: 'INACTIVE', sort_order: 11,
                  valid_from: '2026-11-01T00:00', valid_to: '2026-12-31T23:59', link_url: '#yearend' },
                { title: '低风险配置推荐', status: 'ACTIVE', sort_order: 12,
                  valid_from: '2026-03-20T00:00', valid_to: '2026-09-20T23:59', link_url: '#low-risk' }
            ];
            return base.map((b, i) => ({
                id: i + 1,
                position: DEFAULT_POSITION,
                image_i18n: { 'zh-CN': '', 'zh-TW': '', en: '' },
                gradient: GRADIENTS[i % GRADIENTS.length],
                ...b
            }));
        }

        let banners = buildMockBanners();
        let nextId = banners.length + 1;
        let previewId = 1;
        let pageState = { current: 1, pageSize: 10 };
        let filters = { title: '', status: '', validFrom: '', validTo: '' };
        let imageLang = 'zh-CN';
        let draftImages = { 'zh-CN': '', 'zh-TW': '', en: '' };

        function positionLabel(pos) {
            return positionPathLabel(pos);
        }

        function fmtDateRange(from, to) {
            const f = from ? from.replace('T', ' ').slice(0, 16) : '—';
            const t = to ? to.replace('T', ' ').slice(0, 16) : '—';
            return `${f}<br>至 ${t}`;
        }

        function toDateOnly(dt) {
            if (!dt) return null;
            return dt.slice(0, 10);
        }

        function getFilteredBanners() {
            return banners.filter(b => {
                if (filters.title && !b.title.toLowerCase().includes(filters.title.toLowerCase())) return false;
                if (filters.status && b.status !== filters.status) return false;
                const bFrom = toDateOnly(b.valid_from);
                const bTo = toDateOnly(b.valid_to);
                if (filters.validFrom && bTo && bTo < filters.validFrom) return false;
                if (filters.validTo && bFrom && bFrom > filters.validTo) return false;
                return true;
            }).sort((a, b) => a.sort_order - b.sort_order);
        }

        function getPagedBanners() {
            const all = getFilteredBanners();
            const total = all.length;
            const totalPages = Math.max(1, Math.ceil(total / pageState.pageSize));
            if (pageState.current > totalPages) pageState.current = totalPages;
            const start = (pageState.current - 1) * pageState.pageSize;
            return { all, total, totalPages, rows: all.slice(start, start + pageState.pageSize) };
        }

        function buildPageNumbers(current, totalPages) {
            if (totalPages <= 7) {
                return Array.from({ length: totalPages }, (_, i) => i + 1);
            }
            const pages = [1];
            if (current > 4) pages.push('...');
            const start = Math.max(2, current - 2);
            const end = Math.min(totalPages - 1, current + 2);
            for (let i = start; i <= end; i++) pages.push(i);
            if (current < totalPages - 3) pages.push('...');
            pages.push(totalPages);
            return pages;
        }

        function renderPagination(total, totalPages) {
            const bar = document.getElementById('paginationBar');
            const pages = buildPageNumbers(pageState.current, totalPages);
            bar.innerHTML = `
                <span class="pagination-info">共 ${total} 条记录　第 ${pageState.current} / ${totalPages} 页</span>
                <div class="page-btns">
                    <button class="page-btn" onclick="goPage(${pageState.current - 1})" ${pageState.current <= 1 ? 'disabled' : ''}>&lt;</button>
                    ${pages.map(p => p === '...'
                        ? `<span class="page-btn ellipsis">…</span>`
                        : `<button class="page-btn ${p === pageState.current ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`
                    ).join('')}
                    <button class="page-btn" onclick="goPage(${pageState.current + 1})" ${pageState.current >= totalPages ? 'disabled' : ''}>&gt;</button>
                </div>
                <select class="page-size-select" onchange="changePageSize(this.value)">
                    ${[10, 20, 50].map(n => `<option value="${n}" ${pageState.pageSize === n ? 'selected' : ''}>${n} 条/页</option>`).join('')}
                </select>
                <div class="page-jump">
                    <span>前往</span>
                    <input type="number" id="jumpPageInput" min="1" max="${totalPages}" value="${pageState.current}">
                    <span>页</span>
                    <button class="page-btn" onclick="jumpToPage()">确定</button>
                </div>`;
        }

        function goPage(p) {
            const { totalPages } = getPagedBanners();
            if (p < 1 || p > totalPages) return;
            pageState.current = p;
            renderTable();
        }

        function changePageSize(size) {
            pageState.pageSize = parseInt(size, 10) || 10;
            pageState.current = 1;
            renderTable();
        }

        function jumpToPage() {
            const input = document.getElementById('jumpPageInput');
            const p = parseInt(input?.value, 10);
            if (p) goPage(p);
        }

        function applyFilter() {
            filters = {
                title: document.getElementById('filterTitle').value.trim(),
                status: document.getElementById('filterStatus').value,
                validFrom: document.getElementById('filterValidFrom').value,
                validTo: document.getElementById('filterValidTo').value
            };
            pageState.current = 1;
            renderTable();
        }

        function resetFilter() {
            document.getElementById('filterTitle').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterValidFrom').value = '';
            document.getElementById('filterValidTo').value = '';
            filters = { title: '', status: '', validFrom: '', validTo: '' };
            pageState.current = 1;
            renderTable();
        }

        function bannerImageSummary(b) {
            const img = b.image_i18n || {};
            const ok = ['zh-CN', 'zh-TW', 'en'].filter(l => img[l]).length;
            return ok ? `已传 ${ok}/3 语言` : '未上传';
        }

        function syncDraftImageFromInput() {
            draftImages[imageLang] = document.getElementById('fImage').value.trim();
            const preview = document.getElementById('fImagePreview');
            const url = draftImages[imageLang];
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.removeAttribute('src');
                preview.style.display = 'none';
            }
        }

        function switchImageLang(lang) {
            syncDraftImageFromInput();
            imageLang = lang;
            document.querySelectorAll('#imageLangTabs button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.getElementById('fImage').value = draftImages[lang] || '';
            syncDraftImageFromInput();
        }

        function renderTable() {
            const { rows, total, totalPages } = getPagedBanners();
            document.getElementById('bannerTable').innerHTML = rows.length ? rows.map(b => `
                <tr onclick="selectPreview(${b.id})" style="cursor:pointer;">
                    <td><strong>${b.title}</strong></td>
                    <td style="font-size:12px;color:#666">${bannerImageSummary(b)}</td>
                    <td><span class="pos-tag pos-path">${positionPathLabel(b.position).split(' › ').join('<span class="sep">›</span>')}</span></td>
                    <td>${b.sort_order}</td>
                    <td style="font-size:12px;">${fmtDateRange(b.valid_from, b.valid_to)}</td>
                    <td><span class="badge-${b.status === 'ACTIVE' ? 'active' : 'inactive'}">${b.status === 'ACTIVE' ? '启用' : '停用'}</span></td>
                    <td><div class="thumb" style="background:${b.gradient}">预览</div></td>
                    <td onclick="event.stopPropagation()">
                        <button class="btn-link" onclick="openView(${b.id})">查看</button>
                        <button class="btn-link" onclick="openModal(${b.id})">编辑</button>
                        <button class="btn-link danger" onclick="deleteBanner(${b.id})">删除</button>
                    </td>
                </tr>
            `).join('') : `<tr><td colspan="8" style="text-align:center;color:#999;padding:32px">暂无匹配数据</td></tr>`;
            renderPagination(total, totalPages);
        }

        function refreshPositionSelect(selected) {
            renderPositionTree(selected || DEFAULT_POSITION);
        }

        function selectPreview(id) {
            previewId = id;
            const b = banners.find(x => x.id === id);
            if (!b) return;
            document.getElementById('pvTitle').textContent = b.title;
            const img = b.image_i18n?.['zh-CN'] || b.image_i18n?.en || b.image_i18n?.['zh-TW'] || '';
            const el = document.getElementById('previewBanner');
            if (img) {
                el.style.background = `linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)), url('${img}') center/cover`;
            } else {
                el.style.background = b.gradient;
            }
            document.getElementById('previewBannerId').textContent = `#${b.id}`;
        }

        let modalReadOnly = false;

        function setModalReadOnly(readonly) {
            modalReadOnly = readonly;
            const ids = ['fTitle', 'fSort', 'fValidFrom', 'fValidTo', 'fStatus', 'fLink', 'fImage', 'fImageFile'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = readonly;
            });
            document.getElementById('positionTree').style.pointerEvents = readonly ? 'none' : '';
            document.getElementById('positionTree').style.opacity = readonly ? '0.75' : '';
            document.getElementById('imageLangTabs').style.pointerEvents = readonly ? 'none' : '';
            const saveBtn = document.querySelector('#bannerModal .modal-footer .btn-primary');
            if (saveBtn) saveBtn.style.display = readonly ? 'none' : '';
        }

        function openView(id) {
            openModal(id, true);
        }

        function openModal(id, viewOnly = false) {
            document.getElementById('modalTitle').textContent = viewOnly ? '查看 Banner' : (id ? '编辑 Banner' : '新增 Banner');
            document.getElementById('editId').value = id || '';
            imageLang = 'zh-CN';
            document.querySelectorAll('#imageLangTabs button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === 'zh-CN');
            });
            if (id) {
                const b = banners.find(x => x.id === id);
                document.getElementById('fTitle').value = b.title;
                selectPosition(b.position || DEFAULT_POSITION);
                document.getElementById('fSort').value = b.sort_order;
                document.getElementById('fValidFrom').value = b.valid_from;
                document.getElementById('fValidTo').value = b.valid_to;
                document.getElementById('fStatus').value = b.status;
                document.getElementById('fLink').value = b.link_url || '';
                draftImages = { 'zh-CN': '', 'zh-TW': '', en: '', ...(b.image_i18n || {}) };
                if (!draftImages['zh-CN'] && b.image_url) draftImages['zh-CN'] = b.image_url;
            } else {
                document.getElementById('fTitle').value = '';
                document.getElementById('fLink').value = '';
                selectPosition(DEFAULT_POSITION);
                document.getElementById('fSort').value = banners.length + 1;
                document.getElementById('fStatus').value = 'ACTIVE';
                document.getElementById('fValidFrom').value = '2026-07-01T00:00';
                document.getElementById('fValidTo').value = '2026-12-31T23:59';
                draftImages = { 'zh-CN': '', 'zh-TW': '', en: '' };
            }
            document.getElementById('fImage').value = draftImages['zh-CN'] || '';
            document.getElementById('fImageFile').value = '';
            syncDraftImageFromInput();
            setModalReadOnly(viewOnly);
            document.getElementById('bannerModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('bannerModal').classList.remove('active');
            setModalReadOnly(false);
        }

        function saveBanner() {
            if (modalReadOnly) return;
            const title = document.getElementById('fTitle').value.trim();
            if (!title) { alert('请填写标题'); return; }
            syncDraftImageFromInput();
            const data = {
                title,
                position: document.getElementById('fPosition').value,
                sort_order: parseInt(document.getElementById('fSort').value) || 0,
                valid_from: document.getElementById('fValidFrom').value,
                valid_to: document.getElementById('fValidTo').value,
                status: document.getElementById('fStatus').value,
                link_url: document.getElementById('fLink').value,
                image_i18n: { ...draftImages },
                image_url: draftImages['zh-CN'] || '',
                gradient: 'linear-gradient(135deg, #4c1d95, #7c3aed, #a78bfa)'
            };
            const editId = document.getElementById('editId').value;
            if (editId) {
                const idx = banners.findIndex(b => b.id === parseInt(editId));
                banners[idx] = { ...banners[idx], ...data };
                showToast('Banner 已更新');
            } else {
                banners.push({ id: nextId++, ...data });
                showToast('Banner 已新增');
            }
            closeModal();
            renderTable();
            selectPreview(editId ? parseInt(editId) : nextId - 1);
        }

        function deleteBanner(id) {
            if (!confirm('确定删除此 Banner？')) return;
            banners = banners.filter(b => b.id !== id);
            showToast('Banner 已删除');
            renderTable();
            if (banners.length) selectPreview(banners[0].id);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        document.getElementById('bannerModal').addEventListener('click', e => {
            if (e.target.id === 'bannerModal') closeModal();
        });

        document.getElementById('imageLangTabs')?.addEventListener('click', e => {
            const btn = e.target.closest('button[data-lang]');
            if (btn) switchImageLang(btn.dataset.lang);
        });
        document.getElementById('fImage')?.addEventListener('input', syncDraftImageFromInput);
        document.getElementById('fImageFile')?.addEventListener('change', e => {
            const file = e.target.files?.[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            document.getElementById('fImage').value = url;
            draftImages[imageLang] = url;
            syncDraftImageFromInput();
            showToast(`已选择「${file.name}」作为 ${imageLang} 图片（原型本地预览）`);
        });

        document.addEventListener('DOMContentLoaded', () => {
            refreshPositionSelect(DEFAULT_POSITION);
            renderTable();
            selectPreview(1);
        });
    </script>
</body>
</html>
