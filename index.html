.content{padding:1.25rem 1.5rem}
#view-detail .content{max-width:1100px;margin:0 auto}
.breadcrumb{font-size:.8rem;color:#6b7280;margin-bottom:1rem}

.back{color:#0f766e;text-decoration:none;font-size:.85rem;display:inline-flex;align-items:center;gap:4px;margin-bottom:1rem;cursor:pointer;border:none;background:none;font-family:inherit}

/* Banner */

<script>
/* ── Hash Router ── */
const router = {
  init() {
    window.addEventListener('hashchange', () => this.handleRoute());
    if (!location.hash || location.hash === '#') {
      location.replace('#/list');
    }
    this.handleRoute();
  },
  navigate(hash) {
    const h = hash.startsWith('#') ? hash : '#' + hash;
    if (location.hash === h) {
      this.handleRoute();
    } else {
      location.hash = h;
    }
  },
  parse() {
    const parts = (location.hash.slice(1) || '/list').split('/').filter(Boolean);
    if (parts[0] === 'list' || parts.length === 0) return { view: 'list' };
    if (parts[0] === 'detail') return { view: 'detail', code: decodeURIComponent(parts[1] || '') };
    return { view: 'list' };
  },
  handleRoute() {
    const route = this.parse();
    if (route.view === 'list') {
      showListView();
    } else if (route.view === 'detail') {
      showDetailView(route.code);
    } else {
      this.navigate('#/list');
    }
  }
};

function showListView() {
  document.body.classList.remove('route-detail');
  document.body.classList.add('route-list');
  document.getElementById('view-list').classList.add('active');
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('langSwitch').style.display = 'none';
  document.title = '基金产品 - 产品甄选 - Goldhorse eWealth Hub';
  updatePkBar();
  if (typeof MMF_PRODUCTS !== 'undefined') renderAll();
  window.scrollTo(0, 0);
}

function showDetailView(code) {
  document.body.classList.remove('route-list');
  document.body.classList.add('route-detail');
  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  document.getElementById('langSwitch').style.display = 'flex';
  closePkModal();
  currentDetailFund = findFund(code) || (code ? null : findFund('HK0000720752'));
  renderDetail(currentDetailFund);
  window.scrollTo(0, 0);
}

document.getElementById('backBtn').addEventListener('click', () => router.navigate('#/list'));

/* ── List view ── */
let pkSelected = new Set();
let bannerIdx = 0;
let bannerTimer;

function emptyHtml(msg='暂无数据') {
  return `<div class="empty-state"><i class="fas fa-inbox"></i>${msg}</div>`;
}

function renderBanner() {
  const el = document.getElementById('bannerSection');
  if (document.getElementById('simulateError').checked) { el.innerHTML = ''; return; }
  const banners = getActiveBanners();
  if (!banners.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="banner-section">
    <div class="banner-track" id="bannerTrack">${banners.map(b => `
      <div class="banner-slide" style="background:${b.gradient}">
        <h2>${b.title}</h2><p>${b.subtitle}</p>
      </div>`).join('')}</div>
    <div class="banner-dots">${banners.map((_,i)=>`<span class="banner-dot ${i===0?'active':''}" onclick="goBanner(${i})"></span>`).join('')}</div>
  </div>`;
  clearInterval(bannerTimer);
  if (banners.length > 1) bannerTimer = setInterval(() => goBanner((bannerIdx+1)%banners.length), 5000);
}

function goBanner(i) {
  bannerIdx = i;
  const track = document.getElementById('bannerTrack');

const SHELF_ANIM_KEY = 'ewh_fund_shelf_num_animated';

function formatAnimValue(val, type, decimals) {
  if (val == null || val === '' || Number.isNaN(Number(val))) return '—';
  if (type === 'pct') return (Number(val) >= 0 ? '+' : '') + Number(val).toFixed(2) + '%';
  return Number(val).toFixed(decimals ?? 4);
}

function runShelfNumberAnimation(root) {
  const els = root.querySelectorAll('.num-animate[data-num]');
  const shouldAnimate = !sessionStorage.getItem(SHELF_ANIM_KEY);
  els.forEach(el => {
    const target = parseFloat(el.dataset.num);
    const type = el.dataset.type || 'pct';
    const decimals = parseInt(el.dataset.decimals || '4', 10);
    if (Number.isNaN(target)) { el.textContent = '—'; return; }
    if (!shouldAnimate) {
      el.textContent = formatAnimValue(target, type, decimals);
      return;
    }
    const duration = 1200;
    const start = performance.now();
    function tick(now) {
      const p = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      const current = target * ease;
      el.textContent = formatAnimValue(current, type, decimals);
      if (p < 1) requestAnimationFrame(tick);
      else el.textContent = formatAnimValue(target, type, decimals);
    }
    requestAnimationFrame(tick);
  });
  if (shouldAnimate && els.length) sessionStorage.setItem(SHELF_ANIM_KEY, '1');
}

function renderLineChart(data, chartId) {
  const W = 900, H = 280, pad = {t:28,r:28,b:40,l:56};
  const w = W - pad.l - pad.r, h = H - pad.t - pad.b;
  const vals = data.map(d => d.v);
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const pts = data.map((d, i) => {
    const x = pad.l + (data.length === 1 ? w / 2 : (i / (data.length - 1)) * w);
    const y = pad.t + h - ((d.v - min) / range) * h;
    return {x, y, d};
  });
  const poly = pts.map(p => `${p.x},${p.y}`).join(' ');
  const yTicks = [min, min + range / 2, max].map(v => v.toFixed(4));
  const xLabels = [data[0], data[Math.floor(data.length / 2)], data[data.length - 1]];
  return `<div class="chart-box" id="${chartId}-wrap">
    <div class="chart-tooltip" id="${chartId}-tip"></div>
    <svg class="line-chart" id="${chartId}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${yTicks.map((t, i) => {
        const y = pad.t + h - (i / 2) * h;
        return `<line x1="${pad.l}" y1="${y}" x2="${pad.l + w}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>
          <text x="${pad.l - 8}" y="${y + 4}" text-anchor="end" font-size="10" fill="#9ca3af">${t}</text>`;
      }).join('')}
      <g id="${chartId}-cross" style="display:none">
        <line id="${chartId}-vline" stroke="#0f766e" stroke-width="1" stroke-dasharray="4 3" opacity=".6"/>
        <line id="${chartId}-hline" stroke="#0f766e" stroke-width="1" stroke-dasharray="4 3" opacity=".6"/>
        <circle id="${chartId}-dot" r="5" fill="#0f766e" stroke="#fff" stroke-width="2"/>
      </g>
      <polyline points="${poly}" fill="none" stroke="#0f766e" stroke-width="2.5" stroke-linejoin="round"/>
      ${xLabels.map(d => {
        const i = data.indexOf(d);
        const x = pad.l + (data.length === 1 ? w / 2 : (i / (data.length - 1)) * w);
        return `<text x="${x}" y="${H - 10}" text-anchor="middle" font-size="10" fill="#9ca3af">${d.d}</text>`;
      }).join('')}
    </svg>
  </div>`;
}

function bindChartInteraction(chartId, data) {
  const svg = document.getElementById(chartId);
  const tip = document.getElementById(chartId + '-tip');
  const cross = document.getElementById(chartId + '-cross');
  const vline = document.getElementById(chartId + '-vline');
  const hline = document.getElementById(chartId + '-hline');
  const dot = document.getElementById(chartId + '-dot');
  if (!svg || !data.length) return;

  const W = 900, H = 280, pad = {t:28,r:28,b:40,l:56};
  const w = W - pad.l - pad.r, h = H - pad.t - pad.b;
  const vals = data.map(d => d.v);
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const pts = data.map((d, i) => ({
    x: pad.l + (data.length === 1 ? w / 2 : (i / (data.length - 1)) * w),
    y: pad.t + h - ((d.v - min) / range) * h,
    d
  }));

  function onMove(evt) {
    const rect = svg.getBoundingClientRect();
    const scaleX = 900 / rect.width;
    const mx = (evt.clientX - rect.left) * scaleX;
    let nearest = pts[0], dist = Infinity;
    pts.forEach(p => {
      const d = Math.abs(p.x - mx);
      if (d < dist) { dist = d; nearest = p; }
    });
    cross.style.display = '';
    vline.setAttribute('x1', nearest.x); vline.setAttribute('x2', nearest.x);
    vline.setAttribute('y1', pad.t); vline.setAttribute('y2', pad.t + h);
    hline.setAttribute('x1', pad.l); hline.setAttribute('x2', pad.l + w);
    hline.setAttribute('y1', nearest.y); hline.setAttribute('y2', nearest.y);
    dot.setAttribute('cx', nearest.x); dot.setAttribute('cy', nearest.y);
    tip.style.display = 'block';
    tip.innerHTML = `日期：${nearest.d.d}<br>净值：${nearest.d.v.toFixed(4)}`;
    const lx = (nearest.x / 900) * rect.width;
    const ly = (nearest.y / 280) * rect.height;
    tip.style.left = Math.min(lx + 12, rect.width - 120) + 'px';
    tip.style.top = Math.max(ly - 48, 4) + 'px';
  }

  function onLeave() {
    cross.style.display = 'none';
    tip.style.display = 'none';
  }

  svg.addEventListener('mousemove', onMove);
  svg.addEventListener('mouseleave', onLeave);
}

function initDetailTabs(tabs) {
  if (detailScrollHandler) {
    window.removeEventListener('scroll', detailScrollHandler);
    detailScrollHandler = null;
  }
  const tabEls = document.querySelectorAll('.detail-tab');
  const sections = tabs.map(t => document.getElementById(t.id)).filter(Boolean);
  tabEls.forEach(tab => {
    tab.addEventListener('click', () => {
      const id = tab.dataset.target;
      document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
  detailScrollHandler = () => {
    const offset = 120;
    let active = tabs[0]?.id;
    sections.forEach(sec => { if (sec.getBoundingClientRect().top <= offset) active = sec.id; });
    tabEls.forEach(t => t.classList.toggle('active', t.dataset.target === active));
  };
  window.addEventListener('scroll', detailScrollHandler, { passive: true });
  detailScrollHandler();
}

function renderDetail(f) {
  if (!f) {
    document.getElementById('detailRoot').innerHTML = `<div class="card"><div class="empty"><i class="fas fa-inbox" style="font-size:2rem;display:block;margin-bottom:8px"></i>暂无数据</div></div>`;
    document.title = '基金详情 - Goldhorse eWealth Hub';
    return;
  }
  const chartData = [...NAV_HIST].sort((a, b) => a.iso.localeCompare(b.iso));
  const tabs = buildDetailTabs(f);
  const sections = [];
  sections.push(`<div class="card detail-section" id="sec-nav">
    <div class="card-title"><i class="fas fa-chart-line" style="color:#0f766e"></i> 净值走势</div>
    ${renderLineChart(chartData, 'navChart')}
    <p style="font-size:.75rem;color:#9ca3af;margin-top:8px">鼠标移至折线图可查看每日净值</p>
  </div>`);
  if (tabs.some(t => t.id === 'sec-performance')) {
    sections.push(`<div class="card detail-section" id="sec-performance">
      <div class="card-title"><i class="fas fa-chart-bar" style="color:#0f766e"></i> 基金表现</div>
      ${renderPerformanceBlock(f)}
    </div>`);
  }
  sections.push(`<div class="card detail-section" id="sec-overview">
    <div class="card-title">基金概况</div>
    ${renderOverviewBlock(f)}
  </div>`);
  if (tabs.some(t => t.id === 'sec-objective')) {
    sections.push(`<div class="card detail-section" id="sec-objective">
      <div class="card-title">目标与策略</div>
      ${renderObjectiveBlock(f)}
    </div>`);
  }
  sections.push(`<div class="card detail-section" id="sec-subscribe">
    <div class="card-title">申购细节</div>
    ${renderSubscribeBlock(f)}
  </div>`);
  sections.push(`<div class="card detail-section" id="sec-docs">
    <div class="card-title">基金文件</div>
    ${renderDocs(f)}
  </div>`);
  const tagPills = (f.product_tags || []).slice(0, 4).map(t => `<span class="pill-detail">${t}</span>`).join('');
  document.getElementById('detailRoot').innerHTML = `
    <div class="card">
      <div class="detail-hero-head">
        <div>
          <h1>${f.product_name}</h1>
          <p style="color:#9ca3af;font-size:.8rem;margin-top:4px;font-family:monospace">${f.product_code}</p>
        </div>
        ${tradeBtn('btn-trade btn-trade-lg', f)}
      </div>
      ${tagPills ? `<div class="pills">${tagPills}</div>` : ''}
      <div class="overview">
        <div class="ov-item"><div class="ov-label">最近净值 (${f.nav_date})</div><div class="ov-val">${f.nav?.toFixed(4)||'—'}</div></div>
        <div class="ov-item"><div class="ov-label">近1月</div><div class="ov-val positive">${fmtPct(f.perf?.m1)}</div></div>
        <div class="ov-item"><div class="ov-label">近1年回报</div><div class="ov-val positive">${fmtPct(f.perf?.y1)}</div></div>
        <div class="ov-item"><div class="ov-label">基金规模</div><div class="ov-val" style="font-size:.9rem">${f.fund_size||'—'}</div></div>
      </div>
    </div>
    <nav class="detail-tabs" id="detailTabs">
      ${tabs.map((t, i) => `<button type="button" class="detail-tab ${i===0?'active':''}" data-target="${t.id}">${t.label}</button>`).join('')}
    </nav>
    ${sections.join('')}`;
  document.title = f.product_name + ' - 基金详情';
  initDetailTabs(tabs);
  bindChartInteraction('navChart', chartData);
  document.querySelectorAll('#langSwitch button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === uiLang);
  });
}

/* ── Boot ── */
document.getElementById('simulateError').addEventListener('change', renderAll);
['riskFilter','fundFilter','houseFilter','minFilter'].forEach(id=>{
  document.getElementById(id).addEventListener('change', renderShelf);
});
document.getElementById('langSwitch')?.addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn || !currentDetailFund) return;
  uiLang = btn.dataset.lang;
  renderDetail(currentDetailFund);
});
document.addEventListener('DOMContentLoaded', () => {
  if (typeof MMF_PRODUCTS === 'undefined') {
    renderAll();
    return;
  }
  try {
    initFilters();
    renderAll();
  } catch (e) {
    console.error(e);
    renderAll();
  }
  router.init();
});
</script>
</body>
</html>
